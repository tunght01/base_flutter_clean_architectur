name: soft_dream_test
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.10.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Utils
  shared_preferences: ^2.5.5
  google_sign_in: ^7.2.0
  async: ^2.13.1
  flutter_bloc: ^9.1.1
  injectable: ^2.7.1+4
  json_annotation: ^4.11.0
  freezed: ^3.2.5
  # DI
  get_it: ^9.2.1

  # Navigation
  go_router: ^15.1.2
  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  device_info_plus: 12.4.0
  package_info_plus: ^9.0.1
  rxdart: ^0.28.0
  logger: ^2.7.0
  flutter_screenutil: ^5.9.3
  overlay_support: ^2.1.0
  connectivity_plus: ^7.1.1
  uuid: ^4.5.3
  firebase_messaging: ^16.2.0
  intl: ^0.20.2
  auto_route: ^11.1.0
  freezed_annotation: ^3.1.0
  flutter_svg: ^2.2.4
  lottie: ^3.3.3

  flutter_localizations:
    sdk: flutter


dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  injectable_generator: ^2.12.1

  json_serializable: ^6.13.1
  logging: ^1.3.0
  flutter_gen_core: ^5.9.0
  auto_route_generator: ^10.5.0
  intl_utils: ^2.8.14

flutter_intl:
  enabled: true
  main_locale: vi
  output_dir: lib/presentation/resource/generated
  arb_dir: lib/presentation/resource/l10n

# Config generate when build
flutter_gen:
  output: lib/presentation/resource/generated
  line_length: 160

  integrations:
    flutter_svg: true
    # flare_flutter: true

  assets:
    enabled: true
    exclude:
      - .env
      - .env.test
  fonts:
    enabled: true
  # colors:
  #   enabled: true
  #   inputs:
  #     - assets/color/colors.xml
flutter:
  uses-material-design: true
  generate: false
  assets:
    - assets/icons/
    - assets/images/
    - assets/json/
    - assets/raw/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-ExtraLight.ttf
          weight: 200

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-ExtraLightItalic.ttf
          weight: 200
          style: italic

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Light.ttf
          weight: 300

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-LightItalic.ttf
          weight: 300
          style: italic

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Regular.ttf
          weight: 400

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Medium.ttf
          weight: 500

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-MediumItalic.ttf
          weight: 500
          style: italic

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-SemiBoldItalic.ttf
          weight: 600
          style: italic

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Bold.ttf
          weight: 700

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-BoldItalic.ttf
          weight: 700
          style: italic

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-ExtraBold.ttf
          weight: 800

        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-ExtraBoldItalic.ttf
          weight: 800
          style: italic